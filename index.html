<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stitch4Fit | Master Tailors & Bespoke Clothiers</title>
  
  <!-- React 18 & Babel CDN (Allows JSX to run directly in the browser) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Georgia', 'ui-serif', 'serif'],
            sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <style>
    /* Prevent raw text flashing before React loads */
    [v-cloak] { display: none; }
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body class="bg-stone-50 text-stone-900 antialiased">
  
  <div id="root"></div>

  <!-- Inline SVGs mapped as React components for flawless dependency-free rendering -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // SVG Icons
    const MenuIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
    );

    const XIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
    );

    const ScissorsIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="9.8" x2="20" y1="8.2" y2="18.4"></line><line x1="9.8" x2="20" y1="15.8" y2="5.6"></line></svg>
    );

    const ShoppingBagIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" x2="21" y1="6" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
    );

    const AwardIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
    );

    const ArrowRightIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" x2="19" y1="12" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    );

    const ArrowLeftIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" x2="5" y1="12" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    );

    const MapPinIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
    );

    const PhoneIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
    );

    const MailIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
    );

    const CheckCircle2Icon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path></svg>
    );

    const InstagramIcon = ({ size = 22, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>
    );

    const FacebookIcon = ({ size = 22, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
    );

    const RulerIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.3 8.11 15.89 2.7a1 1 0 0 0-1.41 0L2.7 14.48a1 1 0 0 0 0 1.41l5.41 5.41a1 1 0 0 0 1.42 0L21.3 9.52a1 1 0 0 0 0-1.41z"></path><path d="m5.64 12.85 2.12 2.12"></path><path d="m7.76 10.73 2.12 2.12"></path><path d="m9.88 8.61 2.12 2.12"></path><path d="m12 6.5 2.12 2.12"></path><path d="m14.12 4.38 2.12 2.12"></path></svg>
    );


    // App Component
    function App() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [currentView, setCurrentView] = useState('home'); // 'home' or 'alterations'
      const [selectedService, setSelectedService] = useState('Bespoke Custom Suiting');
      const [customInquiryDetails, setCustomInquiryDetails] = useState('');

      const contactFormRef = useRef(null);

      // Handle scroll effect for navbar
      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 20);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Scroll to top on view change
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, [currentView]);

      const navLinks = [
        { name: 'Custom Experience', href: '#bespoke-journey', view: 'home' },
        { name: 'Alterations Guide', action: () => setCurrentView('alterations') },
        { name: 'Our Craft', href: '#about', view: 'home' },
        { name: 'Contact', href: '#contact', view: 'home' },
      ];

      const handleNavClick = (link) => {
        setIsMobileMenuOpen(false);
        if (link.action) {
          link.action();
        } else {
          setCurrentView('home');
          setTimeout(() => {
            const element = document.querySelector(link.href);
            if (element) {
              element.scrollIntoView({ behavior: 'smooth' });
            }
          }, 100);
        }
      };

      const handleBeginCustomJourney = () => {
        setCurrentView('home');
        setSelectedService('Bespoke Custom Suiting');
        setCustomInquiryDetails('I am interested in beginning a custom suit design. Let\'s schedule my physical measurement and fabric consultation.');
        setTimeout(() => {
          const contactSec = document.getElementById('contact');
          if (contactSec) {
            contactSec.scrollIntoView({ behavior: 'smooth' });
          }
        }, 150);
      };

      const bgPattern = {
        backgroundImage: `url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")`
      };

      return (
        <div className="min-h-screen relative" style={bgPattern}>
          
          {/* NAVIGATION */}
          <nav 
            className={`fixed w-full z-50 transition-all duration-300 ${
              isScrolled || currentView !== 'home' ? 'bg-white/95 backdrop-blur-md py-4 shadow-sm border-b border-stone-100' : 'bg-transparent py-6'
            }`}
          >
            <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
              <button 
                onClick={() => setCurrentView('home')} 
                className="text-2xl font-serif font-bold tracking-wider text-stone-900 focus:outline-none"
              >
                STITCH<span className="text-stone-400 font-light">4</span>FIT
              </button>

              {/* Desktop Nav */}
              <div className="hidden md:flex space-x-8 items-center">
                {navLinks.map((link, idx) => (
                  <button 
                    key={idx} 
                    onClick={() => handleNavClick(link)} 
                    className={`text-sm font-medium transition-colors focus:outline-none ${
                      currentView === 'alterations' && link.name === 'Alterations Guide' 
                        ? 'text-stone-900 border-b-2 border-stone-900 pb-1' 
                        : 'text-stone-600 hover:text-stone-900'
                    }`}
                  >
                    {link.name}
                  </button>
                ))}
                <a 
                  href="#contact" 
                  onClick={(e) => {
                    if (currentView !== 'home') {
                      e.preventDefault();
                      setCurrentView('home');
                      setTimeout(() => {
                        document.querySelector('#contact')?.scrollIntoView({ behavior: 'smooth' });
                      }, 100);
                    }
                  }}
                  className="bg-stone-900 hover:bg-stone-800 text-white px-6 py-2.5 rounded-none text-sm font-medium transition-all duration-300"
                >
                  Book Fitting
                </a>
              </div>

              {/* Mobile Menu Toggle */}
              <button 
                className="md:hidden text-stone-900 hover:text-stone-600 transition-colors"
                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
              >
                {isMobileMenuOpen ? <XIcon size={28} /> : <MenuIcon size={28} />}
              </button>
            </div>

            {/* Mobile Nav Dropdown */}
            {isMobileMenuOpen && (
              <div className="md:hidden absolute top-full left-0 w-full bg-white border-t border-stone-100 shadow-xl py-6 px-6 flex flex-col space-y-6">
                {navLinks.map((link, idx) => (
                  <button 
                    key={idx} 
                    onClick={() => handleNavClick(link)} 
                    className="text-left text-lg font-medium text-stone-600 hover:text-stone-900 transition-colors focus:outline-none"
                  >
                    {link.name}
                  </button>
                ))}
                <a 
                  href="#contact" 
                  className="bg-stone-900 text-center text-white px-6 py-3 rounded-none font-medium"
                  onClick={(e) => {
                    setIsMobileMenuOpen(false);
                    if (currentView !== 'home') {
                      e.preventDefault();
                      setCurrentView('home');
                      setTimeout(() => {
                        document.querySelector('#contact')?.scrollIntoView({ behavior: 'smooth' });
                      }, 100);
                    }
                  }}
                >
                  Book Fitting
                </a>
              </div>
            )}
          </nav>

          {/* RENDER VIEW: HOME */}
          {currentView === 'home' && (
            <>
              {/* HERO SECTION */}
              <section className="relative pt-32 pb-20 md:pt-48 md:pb-32 overflow-hidden border-b border-stone-200">
                <div className="max-w-7xl mx-auto px-6 md:px-12 flex flex-col lg:flex-row items-center gap-12">
                  
                  <div className="w-full lg:w-1/2 relative z-10 text-center lg:text-left">
                    <h2 className="text-stone-500 font-medium tracking-widest uppercase mb-4 text-sm">
                      Master Tailors & Custom Clothiers
                    </h2>
                    <h1 className="text-5xl md:text-7xl font-serif font-bold text-stone-900 leading-tight mb-6">
                      Custom Built. <br /> Made For You.
                    </h1>
                    <p className="text-lg text-stone-600 mb-10 max-w-xl mx-auto lg:mx-0 font-light leading-relaxed">
                      Stop renting template fits that compromise your presentation. Experience a suit designed organically around your movements, hand-measured and crafted to project absolute authority.
                    </p>
                    <div className="flex flex-col sm:flex-row justify-center lg:justify-start items-center space-y-4 sm:space-y-0 sm:space-x-4">
                      <button 
                        onClick={handleBeginCustomJourney}
                        className="w-full sm:w-auto bg-stone-900 hover:bg-stone-800 text-white px-8 py-4 rounded-none text-base font-medium transition-all duration-300 flex items-center justify-center group"
                      >
                        Design Your Suit
                        <ArrowRightIcon className="ml-2 group-hover:translate-x-1 transition-transform" size={18} />
                      </button>
                      <button 
                        onClick={() => setCurrentView('alterations')}
                        className="w-full sm:w-auto border border-stone-300 hover:border-stone-900 text-stone-700 hover:text-stone-900 px-8 py-4 rounded-none text-base font-medium transition-colors flex items-center justify-center"
                      >
                        Our Alterations Guide
                      </button>
                    </div>
                  </div>

                  <div className="w-full lg:w-1/2 relative">
                    <div className="absolute inset-0 bg-stone-200 translate-x-4 translate-y-4 rounded-sm"></div>
                    <img 
                      src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7?auto=format&fit=crop&q=80&w=1200" 
                      alt="Elegant custom tailored suits lined up on a premium wooden rack" 
                      className="relative z-10 w-full h-[500px] object-cover rounded-sm shadow-xl"
                    />
                  </div>
                </div>
              </section>

              {/* SERVICES / OFFERINGS SECTION */}
              <section id="services" className="py-24 bg-white relative border-b border-stone-200">
                <div className="max-w-7xl mx-auto px-6 md:px-12">
                  <div className="text-center mb-16">
                    <h2 className="text-3xl md:text-5xl font-serif font-bold text-stone-900 mb-4">What We Do</h2>
                    <div className="w-16 h-0.5 bg-stone-900 mx-auto"></div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                    {/* Service 1 */}
                    <button 
                      onClick={handleBeginCustomJourney}
                      className="bg-stone-50 p-10 rounded-sm border border-stone-100 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 group text-left block focus:outline-none"
                    >
                      <div className="w-14 h-14 bg-white shadow-sm rounded-full flex items-center justify-center mb-6 group-hover:bg-stone-900 transition-colors border border-stone-200">
                        <ShoppingBagIcon className="text-stone-700 group-hover:text-white transition-colors" size={24} />
                      </div>
                      <h3 className="text-2xl font-serif font-bold text-stone-900 mb-3">Custom Suiting</h3>
                      <p className="text-stone-600 font-light leading-relaxed mb-4">
                        We don't do pre-made retail. Discover the power of a bespoke pattern mapped to your physical blueprint, customized down to the lapel, lining, and button structure.
                      </p>
                      <span className="text-sm font-semibold text-stone-900 underline group-hover:text-stone-600">
                        Begin Custom Consultation
                      </span>
                    </button>

                    {/* Service 2 (Clickable Interactivity) */}
                    <button 
                      onClick={() => setCurrentView('alterations')}
                      className="bg-stone-50 p-10 rounded-sm border border-stone-100 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 group relative overflow-hidden text-left focus:outline-none"
                    >
                      <div className="absolute top-0 right-0 bg-stone-900 text-xs font-medium px-4 py-1 text-white tracking-wider">
                        $10 HEMMING
                      </div>
                      <div className="w-14 h-14 bg-white shadow-sm rounded-full flex items-center justify-center mb-6 group-hover:bg-stone-900 transition-colors border border-stone-200">
                        <ScissorsIcon className="text-stone-700 group-hover:text-white transition-colors" size={24} />
                      </div>
                      <h3 className="text-2xl font-serif font-bold text-stone-900 mb-3 flex items-center">
                        Expert Alterations
                        <ArrowRightIcon size={18} className="ml-2 opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all" />
                      </h3>
                      <p className="text-stone-600 font-light leading-relaxed mb-4">
                        From our famous $10 trouser hemming to complex structural suit styling. Click to view our comprehensive garment alteration and customization guide.
                      </p>
                      <span className="text-sm font-semibold text-stone-900 underline group-hover:text-stone-600">
                        Explore Pricing & Guide
                      </span>
                    </button>

                    {/* Service 3 */}
                    <div className="bg-stone-50 p-10 rounded-sm border border-stone-100 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 group">
                      <div className="w-14 h-14 bg-white shadow-sm rounded-full flex items-center justify-center mb-6 group-hover:bg-stone-900 transition-colors border border-stone-200">
                        <AwardIcon className="text-stone-700 group-hover:text-white transition-colors" size={24} />
                      </div>
                      <h3 className="text-2xl font-serif font-bold text-stone-900 mb-3">Versatile Styling</h3>
                      <p className="text-stone-600 font-light leading-relaxed">
                        Whether you need a sharp outfit for the boardroom, a structured jacket for formal dinners, or polished silhouettes for daily wear, we ensure you project absolute confidence.
                      </p>
                    </div>
                  </div>
                </div>
              </section>

              {/* BESPOKE CUSTOM JOURNEY SECTION (Replaces the pre-made retail shop section) */}
              <section id="bespoke-journey" className="py-24 bg-stone-100/40 border-b border-stone-200 relative">
                <div className="max-w-7xl mx-auto px-6 md:px-12">
                  <div className="text-center mb-16">
                    <span className="text-xs uppercase tracking-widest text-stone-500 font-semibold block mb-2">THE PROCESS</span>
                    <h2 className="text-3xl md:text-5xl font-serif font-bold text-stone-900 mb-4">The Custom Suiting Experience</h2>
                    <div className="w-16 h-0.5 bg-stone-900 mx-auto"></div>
                    <p className="text-stone-600 font-light mt-4 max-w-xl mx-auto">
                      A bespoke garment isn't bought off a shelf; it's designed around your life. Discover our meticulous approach to drafting your personalized pattern.
                    </p>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                    {/* Stage 1 */}
                    <div className="bg-white border border-stone-200 shadow-sm overflow-hidden flex flex-col justify-between">
                      <div>
                        <div className="relative h-80 overflow-hidden">
                          <img 
                            src="https://images.unsplash.com/photo-1558769132-cb1aea458c5e?auto=format&fit=crop&q=80&w=800" 
                            alt="Luxury custom fabric swatches being selected" 
                            className="w-full h-full object-cover transition-transform duration-500 hover:scale-102"
                          />
                          <div className="absolute top-4 left-4 bg-stone-900 text-white text-xs font-bold w-8 h-8 rounded-full flex items-center justify-center">1</div>
                        </div>
                        <div className="p-8">
                          <h3 className="text-2xl font-serif font-bold text-stone-900 mb-2">Fabric & Styling Selection</h3>
                          <p className="text-stone-600 text-sm font-light leading-relaxed">
                            Your suit begins with selection. Choose from hundreds of premium weight cloths, structured wools, and breathable linings. Together we coordinate details like lapel configurations, pocket styles, and button characteristics.
                          </p>
                        </div>
                      </div>
                    </div>

                    {/* Stage 2 */}
                    <div className="bg-white border border-stone-200 shadow-sm overflow-hidden flex flex-col justify-between">
                      <div>
                        <div className="relative h-80 overflow-hidden">
                          <img 
                            src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?auto=format&fit=crop&q=80&w=800" 
                            alt="Tailor measuring an arm with yellow measuring tape" 
                            className="w-full h-full object-cover transition-transform duration-500 hover:scale-102"
                          />
                          <div className="absolute top-4 left-4 bg-stone-900 text-white text-xs font-bold w-8 h-8 rounded-full flex items-center justify-center">2</div>
                        </div>
                        <div className="p-8">
                          <h3 className="text-2xl font-serif font-bold text-stone-900 mb-2">Anatomical Blueprinting</h3>
                          <p className="text-stone-600 text-sm font-light leading-relaxed">
                            We take detailed measurements mapping your exact shoulder slope, posture alignment, and arm extension. We construct a 2D canvas pattern designed exclusively around your natural physique.
                          </p>
                        </div>
                      </div>
                    </div>

                    {/* Stage 3 */}
                    <div className="bg-white border border-stone-200 shadow-sm overflow-hidden flex flex-col justify-between">
                      <div>
                        <div className="relative h-80 overflow-hidden">
                          <img 
                            src="https://images.unsplash.com/photo-1617331721458-bd3ce3e9be66?auto=format&fit=crop&q=80&w=800" 
                            alt="Tailor handcrafting garment stitching detail" 
                            className="w-full h-full object-cover transition-transform duration-500 hover:scale-102"
                          />
                          <div className="absolute top-4 left-4 bg-stone-900 text-white text-xs font-bold w-8 h-8 rounded-full flex items-center justify-center">3</div>
                        </div>
                        <div className="p-8">
                          <h3 className="text-2xl font-serif font-bold text-stone-900 mb-2">Handcraft & Final Fitting</h3>
                          <p className="text-stone-600 text-sm font-light leading-relaxed">
                            Our master tailors sew, baste, and steam your suit to life. After a final in-person adjustment, your suit is modified to lay flat, fall cleanly, and emphasize your frame perfectly.
                          </p>
                        </div>
                      </div>
